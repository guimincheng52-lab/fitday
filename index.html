<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <title>FitDay 健身打卡</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:calc(100vw/37.5)}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
      font-size:1.4rem;background:#f5f5f5;color:#333;
      max-width:450px;margin:0 auto;padding-bottom:12rem;
      min-height:100vh;-webkit-font-smoothing:antialiased
    }
    .hidden{display:none!important}

    /* Card */
    .card{background:#fff;border-radius:1.6rem;padding:3rem;margin:2rem 3rem;box-shadow:0 .2rem 1.2rem rgba(0,0,0,.06)}

    /* Header */
    .header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:6rem 4rem 8rem;color:#fff;border-radius:0 0 4rem 4rem}
    .header .date-info{display:flex;align-items:baseline;gap:2rem;margin-bottom:1.6rem}
    .header .weekday{font-size:4.8rem;font-weight:700}
    .header .date{font-size:2.8rem;color:rgba(255,255,255,.7)}
    .header .motivation{font-size:3.2rem;color:rgba(255,255,255,.85);line-height:1.5}
    .section-title{font-size:3.2rem;font-weight:600;margin-bottom:2.4rem}

    /* Rest day */
    .rest-card{text-align:center;padding:6rem 3rem;margin-top:-4rem;position:relative;z-index:1}
    .rest-icon{font-size:8rem;margin-bottom:2rem}
    .rest-title{display:block;font-size:3.6rem;font-weight:600;margin-bottom:1.2rem}
    .rest-desc{display:block;font-size:2.8rem;color:#999}

    /* Week plan */
    .week-plan{display:flex;justify-content:space-between;gap:1rem;margin-top:1rem}
    .plan-day{flex:1;text-align:center;padding:1.6rem .6rem;border-radius:1.2rem;background:#f8f8f8;font-size:1.2rem}
    .plan-day.active{background:linear-gradient(135deg,#e94560,#c23152);color:#fff}
    .plan-day.today{border:.2rem solid #e94560}
    .plan-day .day-name{display:block;font-weight:500;margin-bottom:.8rem}
    .plan-day .day-plan{display:block;color:#666;font-size:1.1rem}
    .plan-day.active .day-plan{color:rgba(255,255,255,.85)}
    .plan-day .day-plan.rest{color:#bbb}

    /* Today workout */
    .today-card{margin-top:-4rem;position:relative;z-index:1}
    .today-header{display:flex;align-items:center;gap:2.4rem;margin-bottom:2rem}
    .today-template-icon{font-size:6rem}
    .today-template-info{flex:1}
    .today-template-name{display:block;font-size:3.6rem;font-weight:700;margin-bottom:.6rem}
    .today-progress{display:block;font-size:2.6rem;color:#999}
    .progress-bar{height:1.2rem;background:#f0f0f0;border-radius:.6rem;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,#e94560,#ff6b6b);border-radius:.6rem;transition:width .3s}

    /* Exercise list */
    .exercise-list{display:flex;flex-direction:column;gap:2rem}
    .exercise-item{display:flex;align-items:center;gap:2.4rem;padding:2.4rem;background:#fafafa;border-radius:1.6rem;cursor:pointer;transition:.2s;user-select:none}
    .exercise-item:active{transform:scale(.98)}
    .exercise-item.done{background:#f0faf0;opacity:.85}
    .checkbox{width:4.4rem;height:4.4rem;border-radius:50%;border:.3rem solid #ddd;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.2s}
    .checkbox.checked{background:#22c55e;border-color:#22c55e}
    .checkmark{width:1.6rem;height:2.8rem;border:solid #fff;border-width:0 .4rem .4rem 0;transform:rotate(45deg);margin-top:-.4rem}
    .exercise-info{flex:1}
    .exercise-name{display:block;font-size:3rem;font-weight:500;margin-bottom:.4rem}
    .exercise-item.done .exercise-name{color:#999;text-decoration:line-through}
    .exercise-detail{display:block;font-size:2.6rem;color:#999}
    .action-card{margin-top:2rem}
    .action-card button:disabled{background:#ccc;cursor:not-allowed}

    /* Button */
    .btn-primary{display:block;width:100%;padding:2.4rem 0;background:linear-gradient(135deg,#e94560,#c23152);color:#fff;border:none;border-radius:5rem;font-size:3.2rem;font-weight:600;text-align:center;cursor:pointer;transition:.2s}
    .btn-primary:active:not(:disabled){opacity:.85}
    .btn-secondary{display:block;width:100%;padding:2rem 0;background:#f0f0f0;color:#333;border:none;border-radius:5rem;font-size:2.8rem;font-weight:500;text-align:center;cursor:pointer;transition:.2s;margin-top:1.6rem}
    .btn-secondary:active{opacity:.8}

    /* Plan page */
    .intro-card{text-align:center;margin-top:2rem}
    .intro-title{font-size:3.6rem;font-weight:700;margin-bottom:1.2rem}
    .intro-desc{font-size:2.6rem;color:#999;line-height:1.6}
    .day-selector{display:flex;flex-wrap:wrap;gap:1.6rem}
    .day-btn{width:calc(25% - 1.2rem);padding:2rem 0;text-align:center;background:#f5f5f5;border-radius:1.6rem;cursor:pointer;border:.2rem solid transparent;transition:.2s;user-select:none}
    .day-btn:active{transform:scale(.95)}
    .day-btn.active{background:linear-gradient(135deg,#e94560,#c23152);border-color:#e94560;color:#fff}
    .day-label{font-size:2.8rem;font-weight:500}
    .assign-item{display:flex;align-items:center;gap:2rem;padding:2.4rem 0;border-bottom:.1rem solid #f0f0f0}
    .assign-item:last-child{border-bottom:none}
    .assign-day{width:10rem}
    .assign-day-name{font-size:3rem;font-weight:600}
    .picker-box{flex:1;padding:1.8rem 2.4rem;background:#f5f5f5;border-radius:1.2rem;font-size:2.8rem;text-align:center;cursor:pointer;position:relative}
    .picker-box.empty{color:#bbb}
    .picker-box select{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer;font-size:2.8rem}

    /* History */
    .stats-card{margin-top:2rem}
    .stats-row{display:flex;align-items:center;justify-content:space-around}
    .stat-item{flex:1;text-align:center}
    .stat-number{display:block;font-size:4.8rem;font-weight:700;color:#e94560;margin-bottom:.8rem}
    .stat-label{display:block;font-size:2.6rem;color:#999}
    .stat-divider{width:.1rem;height:8rem;background:#f0f0f0}
    .empty-state{text-align:center;padding:6rem 0}
    .empty-state .empty-icon{font-size:8rem;margin-bottom:2rem}
    .empty-state .empty-text{display:block;font-size:3.2rem;color:#666;margin-bottom:1.2rem}
    .empty-state .empty-hint{display:block;font-size:2.6rem;color:#bbb}
    .record-item{padding:2.4rem 0;border-bottom:.1rem solid #f5f5f5}
    .record-item:last-child{border-bottom:none}
    .record-header{display:flex;align-items:center;gap:1.6rem;margin-bottom:1.2rem;flex-wrap:wrap}
    .record-date{font-size:3rem;font-weight:600}
    .record-time{font-size:2.4rem;color:#bbb;margin-left:auto}
    .tag{display:inline-block;background:#fef0f0;color:#e94560;border-radius:.8rem;padding:.6rem 1.6rem;font-size:2.4rem}
    .status-done{font-size:2.6rem;color:#22c55e}

    /* Chart */
    .chart-area{margin-top:2rem;padding:1rem 0}
    .chart-week{display:flex;align-items:center;gap:1rem;margin-bottom:1.2rem;font-size:2.2rem}
    .chart-week:last-child{margin-bottom:0}
    .chart-label{width:8rem;text-align:right;color:#999;flex-shrink:0}
    .chart-bar-wrap{flex:1;height:2.8rem;background:#f0f0f0;border-radius:.6rem;overflow:hidden}
    .chart-bar{height:100%;background:linear-gradient(90deg,#e94560,#ff6b6b);border-radius:.6rem;transition:width .5s;min-width:0;display:flex;align-items:center;justify-content:flex-end;padding-right:1rem;color:#fff;font-size:2rem;font-weight:600}
    .chart-bar.full{background:linear-gradient(90deg,#22c55e,#16a34a)}
    .chart-days{width:7rem;text-align:center;font-size:2rem;color:#666;flex-shrink:0}
    .chart-empty{padding:3rem 0;text-align:center;color:#bbb;font-size:2.6rem}

    /* Tab Bar */
    .tab-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:.1rem solid #eee;display:flex;z-index:100;max-width:450px;margin:0 auto}
    .tab-item{flex:1;text-align:center;padding:1.2rem 0 .8rem;font-size:2.2rem;color:#999;cursor:pointer;transition:.2s}
    .tab-item .tab-icon{display:block;font-size:4rem;margin-bottom:.2rem}
    .tab-item.active{color:#e94560}
    .tab-item:active{opacity:.7}
    .page{display:none;padding-top:0}
    .page.active{display:block}

    /* Toast */
    #toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.78);color:#fff;padding:2rem 3rem;border-radius:1.2rem;font-size:3rem;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
    #toast.show{opacity:1}
    #toast.btn-toast{border-radius:1.2rem;pointer-events:auto;cursor:pointer}

    /* Template management */
    .tpl-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.6rem}
    .tpl-header .section-title{margin-bottom:0}
    .btn-sm{padding:.6rem 2rem;border-radius:5rem;border:none;font-size:2.4rem;font-weight:500;cursor:pointer;transition:.2s}
    .btn-sm:active{transform:scale(.95)}
    .btn-sm.primary{background:#e94560;color:#fff}
    .btn-sm.danger{background:#fef0f0;color:#e94560}
    .install-guide{background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:1.6rem;padding:2.4rem 3rem;margin:2rem 3rem;color:#fff;position:relative}
    .install-guide .close-guide{position:absolute;top:1rem;right:1.6rem;font-size:2.8rem;cursor:pointer;opacity:.6;background:none;border:none;color:#fff}
    .install-guide-title{font-size:3rem;font-weight:600;margin-bottom:1.2rem}
    .install-guide-step{display:flex;align-items:center;gap:1.2rem;margin-bottom:.8rem;font-size:2.4rem;color:rgba(255,255,255,.85)}
    .install-guide-step .step-num{width:3.2rem;height:3.2rem;border-radius:50%;background:#e94560;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;flex-shrink:0}
    .btn-sm.outline{background:transparent;color:#e94560;border:.2rem solid #e94560}
    .tpl-list{display:flex;flex-direction:column;gap:1.6rem}
    .tpl-item{display:flex;align-items:center;gap:2rem;padding:2rem;background:#fafafa;border-radius:1.6rem}
    .tpl-icon{font-size:4rem}
    .tpl-info{flex:1}
    .tpl-name{font-size:3rem;font-weight:600;display:block}
    .tpl-meta{font-size:2.2rem;color:#999;display:block;margin-top:.4rem}
    .tpl-badge{font-size:2rem;background:#e8f0fe;color:#1a73e8;padding:.2rem 1rem;border-radius:.6rem}
    .tpl-badge.custom{background:#fef0f0;color:#e94560}
    .tpl-actions{display:flex;gap:1rem}
    .tpl-actions .btn-sm{padding:.4rem 1.6rem;font-size:2rem}

    /* Modal */
    #modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:3rem}
    #modal{background:#fff;border-radius:2rem;width:100%;max-width:400px;max-height:80vh;display:flex;flex-direction:column}
    .modal-header{padding:3rem 3rem 1.5rem;font-size:3.6rem;font-weight:700;border-bottom:.1rem solid #f0f0f0}
    .modal-body{flex:1;overflow-y:auto;padding:2rem 3rem}
    .modal-footer{padding:1.5rem 3rem 3rem;display:flex;gap:1.6rem}
    .modal-footer .btn-primary,.modal-footer .btn-secondary{width:auto;flex:1}

    .modal-body input[type="text"]{width:100%;padding:1.8rem 2rem;border:.2rem solid #eee;border-radius:1.2rem;font-size:2.8rem;margin-bottom:1.6rem;outline:none;transition:border-color .2s}
    .modal-body input[type="text"]:focus{border-color:#e94560}
    .modal-body label{display:block;font-size:2.4rem;font-weight:500;color:#666;margin-bottom:.8rem}

    .modal-exercise-item{display:flex;align-items:center;gap:1rem;margin-bottom:1.2rem}
    .modal-exercise-item input[type="text"]{margin-bottom:0;padding:1.2rem 1.4rem;font-size:2.4rem;flex:2}
    .modal-exercise-item input[type="text"].short{flex:1;min-width:6rem}
    .modal-exercise-item .btn-sm{padding:.4rem 1.2rem;font-size:2rem;flex-shrink:0;background:#fef0f0;color:#e94560}

    .add-exercise-btn{display:flex;align-items:center;justify-content:center;gap:1rem;padding:1.6rem;background:#fafafa;border:.2rem dashed #ddd;border-radius:1.2rem;font-size:2.6rem;color:#999;cursor:pointer;transition:.2s;margin-top:1.2rem}
    .add-exercise-btn:active{background:#f0f0f0}
  </style>
</head>
<body>

<div id="app">
  <!-- ========== 今日 ========== -->
  <div id="page-today" class="page active">
    <div class="header">
      <div class="date-info">
        <span class="weekday" id="today-weekday"></span>
        <span class="date" id="today-date"></span>
      </div>
      <div class="motivation" id="today-motivation"></div>
    </div>
    <!-- 安装引导 -->
    <div id="install-guide" class="install-guide hidden">
      <button class="close-guide" id="close-guide">✕</button>
      <div class="install-guide-title">📲 添加到桌面</div>
      <div class="install-guide-step"><span class="step-num">1</span><span>打开浏览器菜单</span></div>
      <div class="install-guide-step"><span class="step-num">2</span><span>点击「添加到主屏幕」</span></div>
      <div class="install-guide-step"><span class="step-num">3</span><span>以后就能像 App 一样打开啦 🎉</span></div>
    </div>

    <div id="rest-day" class="hidden">
      <div class="card rest-card">
        <div class="rest-icon">😌</div>
        <div class="rest-title">今日休息日</div>
        <div class="rest-desc">好好恢复，下次训练效果更好！</div>
      </div>
      <div class="card">
        <div class="section-title">本周训练计划</div>
        <div class="week-plan" id="week-plan-overview"></div>
      </div>
    </div>
    <div id="workout-day" class="hidden">
      <div class="card today-card">
        <div class="today-header">
          <span class="today-template-icon" id="today-icon"></span>
          <div class="today-template-info">
            <span class="today-template-name" id="today-name"></span>
            <span class="today-progress" id="today-progress-text"></span>
          </div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      </div>
      <div class="card">
        <div class="section-title">训练项目</div>
        <div class="exercise-list" id="exercise-list"></div>
      </div>
      <div class="card action-card">
        <button class="btn-primary" id="checkin-btn" disabled>完成打卡</button>
      </div>
    </div>
  </div>

  <!-- ========== 计划 ========== -->
  <div id="page-plan" class="page">
    <div class="card intro-card">
      <div class="intro-title">📋 我的训练计划</div>
      <div class="intro-desc">选择每周的训练日，并为每个训练日分配训练内容</div>
    </div>
    <div class="card">
      <div class="section-title">选择训练日</div>
      <div class="day-selector" id="day-selector"></div>
    </div>
    <div id="assign-section" class="card hidden">
      <div class="section-title">分配训练内容</div>
      <div id="assign-list"></div>
    </div>
    <div class="card action-card">
      <button class="btn-primary" id="save-plan-btn">保存计划</button>
    </div>
  </div>

  <!-- ========== 模板管理 ========== -->
  <div id="page-templates" class="page">
    <div class="card" style="margin-top:2rem">
      <div class="tpl-header">
        <div class="section-title" style="margin-bottom:0">训练模板</div>
        <button class="btn-sm primary" id="new-tpl-btn">+ 新建</button>
      </div>
      <div id="tpl-list"></div>
    </div>
  </div>

  <!-- ========== 历史 ========== -->
  <div id="page-history" class="page">
    <div class="card stats-card">
      <div class="stats-row">
        <div class="stat-item">
          <span class="stat-number" id="total-days">0</span>
          <span class="stat-label">总训练天数</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-number" id="current-streak">0</span>
          <span class="stat-label">当前连续</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-number" id="max-streak">0</span>
          <span class="stat-label">最长连续</span>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="section-title">周训练统计</div>
      <div class="chart-area" id="chart-area"></div>
    </div>
    <div class="card">
      <div class="section-title">训练记录</div>
      <div id="history-list"></div>
    </div>
  </div>
</div>

<!-- ===== Modal ===== -->
<div id="modal-overlay" class="hidden">
  <div id="modal">
    <div class="modal-header" id="modal-title">新建模板</div>
    <div class="modal-body">
      <label>模板名称</label>
      <input type="text" id="tpl-name-input" placeholder="例如：腿推拉" maxlength="20">
      <label>图标（选填，一个 emoji）</label>
      <input type="text" id="tpl-icon-input" placeholder="例如：🎯" maxlength="2">
      <label>训练动作</label>
      <div id="modal-exercises"></div>
      <div class="add-exercise-btn" id="add-exercise-btn">＋ 添加动作</div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" id="modal-cancel-btn">取消</button>
      <button class="btn-primary" id="modal-save-btn">保存</button>
    </div>
  </div>
</div>

<!-- ===== Tab Bar ===== -->
<div class="tab-bar">
  <div class="tab-item active" data-tab="today"><span class="tab-icon">🏠</span>今日</div>
  <div class="tab-item" data-tab="plan"><span class="tab-icon">📋</span>计划</div>
  <div class="tab-item" data-tab="templates"><span class="tab-icon">🎯</span>模板</div>
  <div class="tab-item" data-tab="history"><span class="tab-icon">📊</span>历史</div>
</div>

<div id="toast"></div>

<script>
// ============================================================
// DATA
// ============================================================
const BUILTIN_TEMPLATES = {
  warmup:{name:'热身激活',icon:'🏃',exercises:[{name:'开合跳',sets:'3组',reps:'30秒'},{name:'高抬腿',sets:'3组',reps:'20次'},{name:'肩部环绕',sets:'2组',reps:'10次'},{name:'弓步转体',sets:'3组',reps:'8次'},{name:'深蹲热身',sets:'2组',reps:'15次'}]},
  chest:{name:'胸部训练',icon:'🏋️',exercises:[{name:'杠铃卧推',sets:'4组',reps:'10次'},{name:'哑铃飞鸟',sets:'4组',reps:'12次'},{name:'俯卧撑',sets:'3组',reps:'15次'},{name:'绳索夹胸',sets:'4组',reps:'12次'},{name:'双杠臂屈伸',sets:'3组',reps:'12次'}]},
  back:{name:'背部训练',icon:'💪',exercises:[{name:'引体向上',sets:'4组',reps:'8次'},{name:'杠铃划船',sets:'4组',reps:'12次'},{name:'坐姿划船',sets:'4组',reps:'12次'},{name:'高位下拉',sets:'4组',reps:'12次'},{name:'硬拉',sets:'3组',reps:'8次'}]},
  leg:{name:'腿部训练',icon:'🦵',exercises:[{name:'深蹲',sets:'5组',reps:'10次'},{name:'腿举',sets:'4组',reps:'12次'},{name:'腿弯举',sets:'4组',reps:'15次'},{name:'弓箭步',sets:'3组',reps:'12次'},{name:'提踵',sets:'4组',reps:'15次'}]},
  shoulder:{name:'肩部训练',icon:'🔥',exercises:[{name:'哑铃推举',sets:'4组',reps:'12次'},{name:'侧平举',sets:'4组',reps:'15次'},{name:'前平举',sets:'4组',reps:'12次'},{name:'面拉',sets:'4组',reps:'15次'},{name:'阿诺德推举',sets:'3组',reps:'12次'}]},
  arm:{name:'手臂训练',icon:'💪',exercises:[{name:'二头弯举',sets:'4组',reps:'12次'},{name:'三头下压',sets:'4组',reps:'12次'},{name:'锤式弯举',sets:'3组',reps:'12次'},{name:'窄距卧推',sets:'3组',reps:'10次'},{name:'集中弯举',sets:'3组',reps:'15次'}]},
  abs:{name:'腹部训练',icon:'⚡',exercises:[{name:'卷腹',sets:'4组',reps:'20次'},{name:'平板支撑',sets:'4组',reps:'60秒'},{name:'举腿',sets:'3组',reps:'15次'},{name:'俄罗斯转体',sets:'3组',reps:'20次'},{name:'登山跑',sets:'3组',reps:'30秒'}]},
  fullbody:{name:'全身训练',icon:'💥',exercises:[{name:'深蹲',sets:'3组',reps:'12次'},{name:'俯卧撑',sets:'3组',reps:'15次'},{name:'杠铃划船',sets:'3组',reps:'12次'},{name:'哑铃推举',sets:'3组',reps:'12次'},{name:'平板支撑',sets:'3组',reps:'45秒'}]},
  stretch:{name:'拉伸放松',icon:'🧘',exercises:[{name:'大腿前侧拉伸',sets:'2组',reps:'30秒'},{name:'大腿后侧拉伸',sets:'2组',reps:'30秒'},{name:'胸大肌拉伸',sets:'2组',reps:'30秒'},{name:'背部拉伸',sets:'2组',reps:'30秒'},{name:'肩部拉伸',sets:'2组',reps:'30秒'}]}
}

const WEEKDAYS = ['周日','周一','周二','周三','周四','周五','周六']
const MOTIVATIONS = ['今天的汗水，是明天的勋章 💪','别让昨天的懒惰，辜负今天的自己','健身是唯一付出就有回报的事','你流的每滴汗，都在对抗平庸','现在的酸痛，是未来的资本','坚持就是胜利，别停下！','自律即自由 🔥','塑造更好的自己，从今天开始']

// ============================================================
// STORAGE
// ============================================================
function getData(k,fb){try{const v=localStorage.getItem('fitday_'+k);return v?JSON.parse(v):fb}catch{return fb}}
function setData(k,v){localStorage.setItem('fitday_'+k,JSON.stringify(v))}

const $=s=>document.querySelector(s)
const $$=s=>document.querySelectorAll(s)

// ============================================================
// TOAST
// ============================================================
function showToast(msg,isBtn){const el=$('#toast');el.textContent=msg;el.className='show'+(isBtn?' btn-toast':'');clearTimeout(el._timer);if(!isBtn)el._timer=setTimeout(()=>el.classList.remove('show'),1800)}

// ============================================================
// TEMPLATE HELPERS
// ============================================================
function getCustomTemplates(){return getData('customTemplates',{})}
function getAllTemplates(){return{...BUILTIN_TEMPLATES,...getCustomTemplates()}}
function getTemplate(key){return BUILTIN_TEMPLATES[key]||getCustomTemplates()[key]}
function getTemplateList(){
  const builtin=Object.keys(BUILTIN_TEMPLATES).map(k=>({...BUILTIN_TEMPLATES[k],key:k,type:'builtin'}))
  const custom=Object.values(getCustomTemplates()).map(t=>({...t,type:'custom'}))
  return[...builtin,...custom]
}

// ============================================================
// TAB SYSTEM
// ============================================================
let currentTab='today'
$$('.tab-item').forEach(i=>i.addEventListener('click',()=>switchTab(i.dataset.tab)))
function switchTab(tab){currentTab=tab;$$('.tab-item').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));$$('.page').forEach(p=>p.classList.toggle('active',p.id==='page-'+tab));if(tab==='today')renderToday();if(tab==='templates')renderTemplates();if(tab==='history')renderHistory()}

// ============================================================
// TODAY PAGE
// ============================================================
function renderToday(){
  const now=new Date(),dow=now.getDay(),month=now.getMonth()+1,day=now.getDate()
  $('#today-weekday').textContent='周'+['日','一','二','三','四','五','六'][dow]
  $('#today-date').textContent=month+'月'+day+'日'
  $('#today-motivation').textContent=MOTIVATIONS[Math.floor(Math.random()*MOTIVATIONS.length)]

  const plan=getData('plan',{}),tKey=plan[dow],template=tKey?getTemplate(tKey):null
  const allTemplates=getAllTemplates()

  // Week overview
  $('#week-plan-overview').innerHTML=WEEKDAYS.map((n,i)=>{const tk=plan[i],t=tk?allTemplates[tk]:null;return'<div class="plan-day'+(t?' active':'')+(i===dow?' today':'')+'"><span class="day-name">'+n+'</span><span class="day-plan'+(t?'':' rest')+'">'+(t?t.name:'休息')+'</span></div>'}).join('')

  const records=getData('records',{}),todayStr=formatDate(now),checkedIn=!!records[todayStr]
  const savedStatus=checkedIn&&records[todayStr]?.status

  if(!template){$('#rest-day').classList.remove('hidden');$('#workout-day').classList.add('hidden');return}
  $('#rest-day').classList.add('hidden');$('#workout-day').classList.remove('hidden')

  $('#today-icon').textContent=template.icon;const todayEl=$('#exercise-list')
  todayEl.textContent='';$('#today-name').textContent=template.name

  let cs=savedStatus?[...savedStatus]:new Array(template.exercises.length).fill(false)
  const cc=cs.filter(Boolean).length,tc=template.exercises.length,ac=cc>0&&cc===tc,pt=tc>0?(cc/tc*100):0
  $('#today-progress-text').textContent=cc+'/'+tc+' 已完成';$('#progress-fill').style.width=pt+'%'

  template.exercises.forEach((ex,i)=>{
    const div=document.createElement('div');div.className='exercise-item'+(cs[i]?' done':'');div.dataset.index=i
    div.innerHTML='<div class="checkbox'+(cs[i]?' checked':'')+'"><div class="checkmark" style="'+(cs[i]?'':'display:none')+'"></div></div><div class="exercise-info"><span class="exercise-name">'+ex.name+'</span><span class="exercise-detail">'+ex.sets+' × '+ex.reps+'</span></div>'
    todayEl.appendChild(div)
  })

  const btn=$('#checkin-btn');btn.disabled=!ac||checkedIn;btn.textContent=checkedIn?'今日已打卡 ✅':(ac?'完成打卡':'完成打卡')
  todayEl.dataset.checkedStatus=JSON.stringify(cs);todayEl.dataset.checkedIn=checkedIn?'1':'0';todayEl.dataset.templateKey=tKey
}

$('#exercise-list').addEventListener('click',function(e){
  const item=e.target.closest('.exercise-item');if(!item)return;if(this.dataset.checkedIn==='1')return
  const index=parseInt(item.dataset.index),status=JSON.parse(this.dataset.checkedStatus);status[index]=!status[index]
  this.dataset.checkedStatus=JSON.stringify(status)
  const template=getTemplate(this.dataset.templateKey)
  const cc=status.filter(Boolean).length,tc=template.exercises.length,ac=cc===tc,pt=(cc/tc*100)
  $('#today-progress-text').textContent=cc+'/'+tc+' 已完成';$('#progress-fill').style.width=pt+'%';$('#checkin-btn').disabled=!ac
  item.classList.toggle('done',status[index]);const cb=item.querySelector('.checkbox');cb.classList.toggle('checked',status[index]);item.querySelector('.checkmark').style.display=status[index]?'':'none'
})

$('#checkin-btn').addEventListener('click',function(){
  if(this.disabled||this.textContent.includes('已打卡'))return
  const list=$('#exercise-list'),status=JSON.parse(list.dataset.checkedStatus),records=getData('records',{})
  const todayStr=formatDate(new Date()),tKey=list.dataset.templateKey,template=getTemplate(tKey)
  records[todayStr]={date:todayStr,template:template.name,templateKey:tKey,status:status,time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}
  setData('records',records);list.dataset.checkedIn='1';this.disabled=true;this.textContent='今日已打卡 ✅';showToast('打卡成功 🎉')
})

// ============================================================
// PLAN PAGE
// ============================================================
let planState={selectedDays:[],selectedTemplateIndex:{}}
const CUSTOM_PREFIX='custom_'
function nextCustomId(){const ct=getCustomTemplates();let n=0;Object.keys(ct).forEach(k=>{const m=k.match(/^custom_(\d+)$/);if(m)n=Math.max(n,parseInt(m[1])+1)});return CUSTOM_PREFIX+n}

function renderPlan(){
  const plan=getData('plan',{}),selectedDays=Object.keys(plan).map(Number).sort((a,b)=>a-b),selIdx={}
  const tplList=getTemplateList()
  selectedDays.forEach(d=>{const idx=tplList.findIndex(t=>t.key===plan[d]);if(idx>=0)selIdx[d]=idx})
  planState.selectedDays=selectedDays;planState.selectedTemplateIndex=selIdx
  $('#day-selector').innerHTML=WEEKDAYS.map((n,i)=>'<div class="day-btn'+(selectedDays.includes(i)?' active':'')+'" data-index="'+i+'"><span class="day-label">'+n+'</span></div>').join('')
  renderAssignSection()
}

function renderAssignSection(){
  const {selectedDays,selectedTemplateIndex}=planState,s=$('#assign-section'),tplList=getTemplateList()
  if(selectedDays.length===0){s.classList.add('hidden');return}
  s.classList.remove('hidden')
  $('#assign-list').innerHTML=selectedDays.map(d=>{
    const idx=selectedTemplateIndex[d]??-1,sel=idx>=0&&idx<tplList.length?tplList[idx]:null
    const opts=tplList.map((o,i)=>'<option value="'+i+'"'+(i===idx?' selected':'')+'>'+(o.type==='custom'?'🔹 ':'')+o.icon+' '+o.name+'</option>').join('')
    return'<div class="assign-item"><div class="assign-day"><span class="assign-day-name">'+WEEKDAYS[d]+'</span></div><div class="picker-box'+(sel?'':' empty')+'"><span>'+(sel?sel.icon+' '+sel.name:'选择训练内容')+'</span><select data-day="'+d+'"><option value="-1" disabled>选择训练内容</option>'+opts+'</select></div></div>'
  }).join('')
}

$('#day-selector').addEventListener('click',function(e){
  const btn=e.target.closest('.day-btn');if(!btn)return
  const idx=parseInt(btn.dataset.index),{selectedDays,selectedTemplateIndex}=planState
  let sd=[...selectedDays],sti={...selectedTemplateIndex}
  if(sd.includes(idx)){sd=sd.filter(d=>d!==idx);delete sti[idx]}
  else{sd.push(idx);sd.sort((a,b)=>a-b)}
  planState.selectedDays=sd;planState.selectedTemplateIndex=sti
  btn.classList.toggle('active',sd.includes(idx));renderAssignSection()
})

$('#assign-list').addEventListener('change',function(e){
  if(e.target.tagName!=='SELECT')return
  const day=parseInt(e.target.dataset.day),val=parseInt(e.target.value)
  if(val>=0){planState.selectedTemplateIndex[day]=val;const tplList=getTemplateList(),opt=tplList[val];e.target.closest('.picker-box').classList.remove('empty');e.target.closest('.picker-box').querySelector('span').textContent=opt.icon+' '+opt.name}
})

$('#save-plan-btn').addEventListener('click',function(){
  const{selectedDays,selectedTemplateIndex}=planState,tplList=getTemplateList(),plan={}
  selectedDays.forEach(d=>{const idx=selectedTemplateIndex[d];if(idx>=0&&idx<tplList.length)plan[d]=tplList[idx].key})
  setData('plan',plan);showToast('计划已保存 ✅')
})

// ============================================================
// TEMPLATES PAGE
// ============================================================
function renderTemplates(){
  const tplList=getTemplateList()
  if(tplList.length===0){$('#tpl-list').innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><span class="empty-text">暂无可用的训练模板</span></div>';return}
  $('#tpl-list').innerHTML=tplList.map(t=>'<div class="tpl-item"><div class="tpl-icon">'+(t.icon||'🏋️')+'</div><div class="tpl-info"><span class="tpl-name">'+t.name+'</span><span class="tpl-meta">'+t.exercises.length+' 个动作'+(t.type==='builtin'?' · 内置':'')+'</span></div><div class="tpl-actions">'+(t.type==='custom'?'<button class="btn-sm outline" data-edit="'+t.key+'">编辑</button><button class="btn-sm danger" data-delete="'+t.key+'">删除</button>':'')+'</div></div>').join('')
}

$('#tpl-list').addEventListener('click',function(e){
  const editBtn=e.target.closest('[data-edit]'),delBtn=e.target.closest('[data-delete]')
  if(delBtn){const key=delBtn.dataset.delete;if(confirm('确定删除模板「'+getCustomTemplates()[key]?.name+'」吗？')){const ct=getCustomTemplates();delete ct[key];setData('customTemplates',ct);renderTemplates()}}
  if(editBtn){const key=editBtn.dataset.delete;const ct=getCustomTemplates(),tpl=ct[key];if(tpl)openTemplateEditor(key,tpl)}
})

$('#new-tpl-btn').addEventListener('click',()=>openTemplateEditor(null,{name:'',icon:'🎯',exercises:[{name:'',sets:'4组',reps:'12次'}]}))

// ============================================================
// TEMPLATE EDITOR (MODAL)
// ============================================================
let editingTemplateKey=null
function openTemplateEditor(key,tpl){
  editingTemplateKey=key
  $('#modal-title').textContent=key?'编辑模板':'新建模板'
  $('#tpl-name-input').value=tpl.name||''
  $('#tpl-icon-input').value=tpl.icon||'🎯'
  renderModalExercises(tpl.exercises)
  $('#modal-overlay').classList.remove('hidden')
}

function renderModalExercises(exercises){
  $('#modal-exercises').innerHTML=exercises.map((ex,i)=>'<div class="modal-exercise-item"><input type="text" placeholder="动作名称" value="'+ex.name+'" data-idx="'+i+'" data-field="name"><input type="text" class="short" placeholder="组数" value="'+ex.sets+'" data-idx="'+i+'" data-field="sets"><input type="text" class="short" placeholder="次数" value="'+ex.reps+'" data-idx="'+i+'" data-field="reps"><button class="btn-sm danger" data-remove="'+i+'">✕</button></div>').join('')
}

$('#modal-exercises').addEventListener('click',function(e){
  const btn=e.target.closest('[data-remove]');if(!btn)return
  const idx=parseInt(btn.dataset.remove);const tpl=getEditingExercises();tpl.splice(idx,1);renderModalExercises(tpl)
})

$('#add-exercise-btn').addEventListener('click',function(){
  const tpl=getEditingExercises();tpl.push({name:'',sets:'4组',reps:'12次'});renderModalExercises(tpl)
})

function getEditingExercises(){
  const items=$$('#modal-exercises .modal-exercise-item'),result=[]
  items.forEach(item=>{
    const inputs=item.querySelectorAll('input')
    result.push({name:inputs[0].value,sets:inputs[1].value,reps:inputs[2].value})
  })
  return result
}

$('#modal-save-btn').addEventListener('click',function(){
  const name=$('#tpl-name-input').value.trim(),icon=$('#tpl-icon-input').value.trim()||'🎯',exercises=getEditingExercises().filter(e=>e.name.trim())
  if(!name){showToast('请输入模板名称');return}
  if(exercises.length===0){showToast('请至少添加一个训练动作');return}
  const ct=getCustomTemplates(),key=editingTemplateKey||nextCustomId()
  ct[key]={name,icon,exercises}
  setData('customTemplates',ct)
  $('#modal-overlay').classList.add('hidden')
  showToast(key!==editingTemplateKey?'模板已创建 ✅':'模板已更新 ✅')
  renderTemplates();renderPlan()
})

$('#modal-cancel-btn').addEventListener('click',()=>$('#modal-overlay').classList.add('hidden'))
$('#modal-overlay').addEventListener('click',function(e){if(e.target===this)this.classList.add('hidden')})

// ============================================================
// HISTORY PAGE
// ============================================================
function renderHistory(){
  const recordsMap=getData('records',{}),dates=Object.keys(recordsMap).sort(),records=dates.map(d=>recordsMap[d])
  const totalDays=records.length

  // Streak calc
  const dateObjs=dates.map(d=>new Date(d)).sort((a,b)=>a-b)
  let maxStreak=1,tempStreak=1
  for(let i=1;i<dateObjs.length;i++){const diff=(dateObjs[i]-dateObjs[i-1])/86400000;if(diff===1){tempStreak++;maxStreak=Math.max(maxStreak,tempStreak)}else if(diff>1)tempStreak=1}
  if(dateObjs.length===0){maxStreak=0;tempStreak=0}

  const today=new Date();today.setHours(0,0,0,0)
  const lastDate=dateObjs.length>0?new Date(dateObjs[dateObjs.length-1]):null
  let currentStreak=0
  if(lastDate){lastDate.setHours(0,0,0,0);const diffToday=(today-lastDate)/86400000;if(diffToday<=1){currentStreak=1;for(let i=dateObjs.length-2;i>=0;i--){const diff=(dateObjs[i+1]-dateObjs[i])/86400000;if(diff===1)currentStreak++;else break}}}

  $('#total-days').textContent=totalDays;$('#current-streak').textContent=currentStreak;$('#max-streak').textContent=maxStreak

  // Chart
  renderChart(dateObjs)

  // Records
  if(records.length===0){$('#history-list').innerHTML='<div class="empty-state"><div class="empty-icon">📝</div><span class="empty-text">还没有训练记录</span><span class="empty-hint">设定计划开始你的健身之旅吧！</span></div>';return}
  $('#history-list').innerHTML=records.reverse().map(r=>'<div class="record-item"><div class="record-header"><span class="record-date">'+r.date+'</span><span class="tag">'+r.template+'</span><span class="record-time">'+(r.time||'')+'</span></div><div class="record-status"><span class="status-done">✅ 已完成</span></div></div>').join('')
}

function renderChart(dateObjs){
  const area=$('#chart-area')
  if(dateObjs.length===0){area.innerHTML='<div class="chart-empty">训练数据还不够，再坚持几天吧 💪</div>';return}

  // Build last 6 weeks
  const now=new Date();now.setHours(0,0,0,0)
  const weeks=[]
  for(let w=0;w<6;w++){
    const weekEnd=new Date(now);weekEnd.setDate(now.getDate()-now.getDay()+6-w*7)
    const weekStart=new Date(weekEnd);weekStart.setDate(weekEnd.getDate()-6)
    let count=0
    dateObjs.forEach(d=>{if(d>=weekStart&&d<=weekEnd)count++})
    weeks.unshift({start:weekStart,end:weekEnd,count})
  }

  const maxCount=Math.max(...weeks.map(w=>w.count),1)
  area.innerHTML='<div style="margin-bottom:1.6rem;font-size:2.4rem;color:#666">近 6 周训练频率</div>'+weeks.map(w=>{
    const pct=Math.round((w.count/maxCount)*100)
    const label=w.start.getMonth()+1+'/'+w.start.getDate()
    return'<div class="chart-week"><span class="chart-label">'+label+'</span><div class="chart-bar-wrap"><div class="chart-bar'+(w.count>=7?' full':'')+'" style="width:'+Math.max(pct,8)+'%">'+(w.count>2?w.count:'')+'</div></div><span class="chart-days">'+w.count+'/7天</span></div>'
  }).join('')
}

// ============================================================
// UTILS
// ============================================================
function formatDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}

if(!getData('installDismissed',false)){$('#install-guide').classList.remove('hidden')}
$('#close-guide').addEventListener('click',function(){$('#install-guide').classList.add('hidden');setData('installDismissed',true)})
